<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>บันทึกรายรับ–รายจ่าย</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --api: "https://script.google.com/macros/s/AKfycbwcT7I4lRjdkwf7seGxQQwueVB8VZoQRMHzjwru7Ef4Q2mBJn8WfArPYeNcySfJOh7l2Q/exec";
  --bg: #f5f4f0;
  --surface: #ffffff;
  --border: #e2e0d8;
  --border2: #ccc9be;
  --text: #1a1917;
  --muted: #6b6860;
  --hint: #9e9b92;
  --blue: #1a4f8a;
  --blue-bg: #e8f0fa;
  --blue-text: #0f3361;
  --green: #1a6b45;
  --green-bg: #e6f5ee;
  --green-text: #0f4a2e;
  --red: #8a2b1a;
  --red-bg: #faece8;
  --red-text: #5a1a0d;
  --amber: #7a4f0a;
  --amber-bg: #fdf3e0;
  --radius: 8px;
  --radius-lg: 12px;
  --font: 'IBM Plex Sans Thai', sans-serif;
  --mono: 'IBM Plex Mono', monospace;
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── LOGIN ── */
#loginScreen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
}
.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 2.5rem 2rem;
  width: 320px;
  box-shadow: var(--shadow);
  text-align: center;
}
.login-icon {
  width: 48px; height: 48px;
  background: var(--blue-bg);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 1rem;
  font-size: 22px;
}
.login-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.login-sub { font-size: 13px; color: var(--muted); margin-bottom: 1.5rem; }
.login-card input {
  width: 100%; padding: 10px 12px;
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  font-family: var(--font); font-size: 14px;
  background: var(--bg); color: var(--text);
  text-align: center; letter-spacing: 3px;
  margin-bottom: 10px;
}
.login-card input:focus { outline: none; border-color: var(--blue); }
.btn-login {
  width: 100%; padding: 10px;
  background: var(--blue); color: #fff;
  border: none; border-radius: var(--radius);
  font-family: var(--font); font-size: 14px; font-weight: 500;
  cursor: pointer; transition: opacity .15s;
}
.btn-login:hover { opacity: .85; }
.login-err { font-size: 12px; color: var(--red); margin-top: 8px; min-height: 18px; }

/* ── APP SHELL ── */
#app { display: none; }
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 1.5rem;
  display: flex; align-items: center; justify-content: space-between;
  height: 52px; position: sticky; top: 0; z-index: 10;
}
.topbar-title { font-size: 15px; font-weight: 600; }
.topbar-right { display: flex; align-items: center; gap: 8px; }
.tag-user {
  font-size: 12px; padding: 3px 10px;
  background: var(--blue-bg); color: var(--blue-text);
  border-radius: 20px; font-weight: 500;
}
.btn-logout {
  font-size: 12px; padding: 4px 10px;
  border: 1px solid var(--border2); border-radius: var(--radius);
  background: transparent; color: var(--muted); cursor: pointer;
  font-family: var(--font);
}
.btn-logout:hover { background: var(--bg); }

.main { max-width: 900px; margin: 0 auto; padding: 1.25rem 1.25rem 3rem; }

/* ── SUMMARY ── */
.summary-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px; margin-bottom: 1.25rem;
}
.sc {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: .75rem 1rem;
}
.sc .lbl { font-size: 11px; color: var(--muted); margin-bottom: 3px; text-transform: uppercase; letter-spacing: .5px; }
.sc .val { font-size: 20px; font-weight: 600; font-family: var(--mono); }
.val-p { color: var(--blue); }
.val-i { color: var(--green); }
.val-e { color: var(--red); }
.val-net { font-size: 16px; }
.net-pos { color: var(--green); }
.net-neg { color: var(--red); }

/* ── CARDS ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1rem 1.25rem;
  margin-bottom: 1rem;
}
.sec-title {
  font-size: 12px; font-weight: 600;
  color: var(--muted); text-transform: uppercase;
  letter-spacing: .6px; margin-bottom: 10px;
}

/* ── FILTER BAR ── */
.filter-row {
  display: grid;
  grid-template-columns: 136px 136px 110px 1fr auto;
  gap: 8px; align-items: end;
}
.fg label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; }
.fg input, .fg select {
  width: 100%; padding: 7px 9px;
  border: 1px solid var(--border2); border-radius: var(--radius);
  font-family: var(--font); font-size: 13px;
  background: var(--bg); color: var(--text);
}
.fg input:focus, .fg select:focus { outline: none; border-color: var(--blue); }
.btn-row { display: flex; gap: 6px; align-items: flex-end; }
.btn-sm {
  padding: 7px 12px; border: 1px solid var(--border2);
  border-radius: var(--radius); background: var(--bg);
  color: var(--muted); cursor: pointer; font-family: var(--font);
  font-size: 12px; white-space: nowrap; display: flex; align-items: center; gap: 5px;
}
.btn-sm:hover { background: var(--border); }
.btn-excel {
  padding: 7px 12px; border: 1px solid var(--green);
  border-radius: var(--radius);
  background: var(--green-bg); color: var(--green-text);
  cursor: pointer; font-family: var(--font);
  font-size: 12px; font-weight: 500; white-space: nowrap;
  display: flex; align-items: center; gap: 5px;
}
.btn-excel:hover { opacity: .85; }

/* ── ADD FORM ── */
.form-row1 { display: grid; grid-template-columns: 126px 1fr 120px 110px; gap: 8px; margin-bottom: 8px; }
.form-row2 { display: grid; grid-template-columns: 1fr 90px; gap: 8px; align-items: end; }
.fg textarea {
  width: 100%; padding: 7px 9px;
  border: 1px solid var(--border2); border-radius: var(--radius);
  font-family: var(--font); font-size: 13px;
  background: var(--bg); color: var(--text);
  resize: none; height: 52px; line-height: 1.5;
}
.fg textarea:focus { outline: none; border-color: var(--blue); }
.btn-add {
  width: 100%; height: 52px;
  background: var(--blue); color: #fff;
  border: none; border-radius: var(--radius);
  font-family: var(--font); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: opacity .15s;
}
.btn-add:hover { opacity: .85; }
.btn-add:disabled { opacity: .5; cursor: not-allowed; }

/* ── TABLE ── */
.table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
colgroup col:nth-child(1) { width: 88px; }
colgroup col:nth-child(2) { width: 170px; }
colgroup col:nth-child(3) { width: 70px; }
colgroup col:nth-child(4) { width: 88px; }
colgroup col:nth-child(5) { width: 78px; }
colgroup col:nth-child(6) { width: 78px; }
colgroup col:nth-child(7) { width: auto; }
colgroup col:nth-child(8) { width: 34px; }

thead th {
  background: var(--bg);
  padding: 8px 10px; text-align: left;
  font-size: 11px; font-weight: 600;
  color: var(--muted); text-transform: uppercase; letter-spacing: .4px;
  border-bottom: 1px solid var(--border);
}
th.r, td.r { text-align: right; }
tbody tr { border-bottom: 1px solid var(--border); }
tbody tr:last-child { border-bottom: none; }
tbody td { padding: 8px 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
tbody tr:hover { background: var(--bg); }
tfoot td {
  background: var(--bg); padding: 8px 10px;
  font-weight: 600; font-family: var(--mono);
  border-top: 1px solid var(--border2); font-size: 13px;
}

.amt-p { color: var(--blue); font-family: var(--mono); font-weight: 500; }
.amt-i { color: var(--green); font-family: var(--mono); font-weight: 500; }
.amt-e { color: var(--red); font-family: var(--mono); font-weight: 500; }
.amt-neg { color: var(--red); font-family: var(--mono); }
.remark { color: var(--hint); font-style: italic; }

.badge {
  display: inline-block; font-size: 11px; padding: 2px 7px;
  border-radius: 4px; font-weight: 500;
}
.bp { background: var(--blue-bg); color: var(--blue-text); }
.bi { background: var(--green-bg); color: var(--green-text); }
.be { background: var(--red-bg); color: var(--red-text); }

.btn-del {
  background: none; border: none; cursor: pointer;
  color: var(--hint); font-size: 16px; padding: 2px;
  border-radius: 4px; line-height: 1;
}
.btn-del:hover { color: var(--red); background: var(--red-bg); }

/* ── STATES ── */
.loading-row td {
  text-align: center; padding: 2rem;
  color: var(--muted); font-size: 13px;
}
.spinner {
  display: inline-block; width: 16px; height: 16px;
  border: 2px solid var(--border2);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #1a1917; color: #fff;
  padding: 10px 20px; border-radius: 8px;
  font-size: 13px; opacity: 0; transition: opacity .25s;
  pointer-events: none; z-index: 100; white-space: nowrap;
}
.toast.show { opacity: 1; }

.filter-info { font-size: 12px; color: var(--hint); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-icon">🔐</div>
    <div class="login-title">บันทึกรายรับ–รายจ่าย</div>
    <div class="login-sub">กรอกรหัสผ่านเพื่อเข้าใช้งาน</div>
    <input type="password" id="pwInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-login" onclick="doLogin()">เข้าสู่ระบบ</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <span class="topbar-title">📒 บันทึกรายรับ–รายจ่าย</span>
    <div class="topbar-right">
      <span class="tag-user" id="tagUser"></span>
      <button class="btn-logout" onclick="doLogout()">ออกจากระบบ</button>
    </div>
  </div>

  <div class="main">

    <!-- SUMMARY -->
    <div class="summary-grid" id="summaryGrid">
      <div class="sc"><div class="lbl">เงินต้นคงเหลือ</div><div class="val val-p" id="sP">—</div></div>
      <div class="sc"><div class="lbl">ดอกเบี้ยรวม</div><div class="val val-i" id="sI">—</div></div>
      <div class="sc"><div class="lbl">เบิกใช้รวม</div><div class="val val-e" id="sE">—</div></div>
      <div class="sc"><div class="lbl">ดอก – ค่าใช้จ่าย (net)</div><div class="val val-net" id="sNet">—</div></div>
    </div>

    <!-- FILTER -->
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div class="sec-title" style="margin:0">กรองข้อมูล</div>
        <span class="filter-info" id="filterInfo"></span>
      </div>
      <div class="filter-row">
        <div class="fg"><label>วันที่เริ่มต้น</label><input type="date" id="fFrom" oninput="render()"></div>
        <div class="fg"><label>วันที่สิ้นสุด</label><input type="date" id="fTo" oninput="render()"></div>
        <div class="fg">
          <label>ประเภท</label>
          <select id="fType" oninput="render()">
            <option value="">ทั้งหมด</option>
            <option value="principal">เงินต้น</option>
            <option value="interest">ดอกเบี้ย</option>
            <option value="expense">เบิกใช้</option>
          </select>
        </div>
        <div class="fg"><label>ค้นหา</label><input type="text" id="fSearch" placeholder="รายละเอียด / หมายเหตุ..." oninput="render()"></div>
        <div class="btn-row">
          <button class="btn-sm" onclick="clearFilter()">↺ ล้าง</button>
          <button class="btn-excel" onclick="exportExcel()">⬇ Excel</button>
        </div>
      </div>
    </div>

    <!-- ADD FORM -->
    <div class="card">
      <div class="sec-title">เพิ่มรายการใหม่</div>
      <div class="form-row1">
        <div class="fg"><label>วันที่</label><input type="date" id="eDate"></div>
        <div class="fg"><label>รายละเอียด</label><input type="text" id="eDesc" placeholder="รายละเอียด..."></div>
        <div class="fg">
          <label>ประเภท</label>
          <select id="eType">
            <option value="principal">เงินต้น</option>
            <option value="interest">ดอกเบี้ย</option>
            <option value="expense">เบิกใช้</option>
          </select>
        </div>
        <div class="fg"><label>จำนวน</label><input type="number" id="eAmt" placeholder="0" step="100"></div>
      </div>
      <div class="form-row2">
        <div class="fg"><label>หมายเหตุ (Remark)</label><textarea id="eRemark" placeholder="หมายเหตุเพิ่มเติม..."></textarea></div>
        <button class="btn-add" id="btnAdd" onclick="addEntry()">+ เพิ่ม</button>
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
      <table>
        <colgroup><col><col><col><col><col><col><col><col></colgroup>
        <thead>
          <tr>
            <th>วันที่</th><th>รายละเอียด</th><th>ประเภท</th>
            <th class="r">เงินต้น</th><th class="r">ดอกเบี้ย</th><th class="r">เบิกใช้</th>
            <th>หมายเหตุ</th><th></th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr class="loading-row"><td colspan="8"><span class="spinner"></span>กำลังโหลดข้อมูล...</td></tr>
        </tbody>
        <tfoot id="tfoot"></tfoot>
      </table>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwcT7I4lRjdkwf7seGxQQwueVB8VZoQRMHzjwru7Ef4Q2mBJn8WfArPYeNcySfJOh7l2Q/exec";

// ── USERS: เพิ่ม/แก้ชื่อและรหัสผ่านได้ที่นี่ ──
const USERS = {
  "1234": "Nook",
  "5678": "User2",
  "9999": "User3",
};

let entries = [];
let currentUser = "";

// ── AUTH ──
function doLogin() {
  const pw = document.getElementById('pwInput').value.trim();
  if (USERS[pw]) {
    currentUser = USERS[pw];
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('tagUser').textContent = currentUser;
    document.getElementById('eDate').value = new Date().toISOString().split('T')[0];
    loadData();
  } else {
    document.getElementById('loginErr').textContent = 'รหัสผ่านไม่ถูกต้อง';
    document.getElementById('pwInput').value = '';
  }
}
function doLogout() {
  currentUser = '';
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('pwInput').value = '';
  document.getElementById('loginErr').textContent = '';
}

// ── API CALLS ──
async function loadData() {
  document.getElementById('tbody').innerHTML =
    '<tr class="loading-row"><td colspan="8"><span class="spinner"></span>กำลังโหลดข้อมูล...</td></tr>';
  try {
    const res = await fetch(API + "?action=getAll");
    const json = await res.json();
    entries = (json.data || []).map(r => ({
      id: r.id,
      date: r.date,
      desc: r.desc,
      type: r.type,
      amount: parseFloat(r.amount) || 0,
      interest: parseFloat(r.interest) || 0,
      remark: r.remark || ""
    }));
    render();
  } catch(e) {
    document.getElementById('tbody').innerHTML =
      '<tr class="loading-row"><td colspan="8" style="color:var(--red)">โหลดข้อมูลไม่สำเร็จ กรุณา refresh</td></tr>';
  }
}

async function addEntry() {
  const date = document.getElementById('eDate').value;
  const desc = document.getElementById('eDesc').value.trim();
  const type = document.getElementById('eType').value;
  const amount = parseFloat(document.getElementById('eAmt').value) || 0;
  const remark = document.getElementById('eRemark').value.trim();
  if (!date || !desc || !amount) { showToast('กรุณากรอกข้อมูลให้ครบ'); return; }

  const btn = document.getElementById('btnAdd');
  btn.disabled = true; btn.textContent = 'กำลังบันทึก...';
  try {
    const res = await fetch(API, {
      method: 'POST',
      body: JSON.stringify({ action: 'add', data: { date, desc, type, amount, remark } })
    });
    const json = await res.json();
    if (json.success) {
      entries.push({ id: json.id, date, desc, type, amount, interest: 0, remark });
      document.getElementById('eDesc').value = '';
      document.getElementById('eAmt').value = '';
      document.getElementById('eRemark').value = '';
      render();
      showToast('บันทึกเรียบร้อย ✓');
    }
  } catch(e) { showToast('บันทึกไม่สำเร็จ กรุณาลองใหม่'); }
  btn.disabled = false; btn.textContent = '+ เพิ่ม';
}

async function deleteEntry(id) {
  if (!confirm('ยืนยันลบรายการนี้?')) return;
  entries = entries.filter(e => e.id !== id);
  render();
  try {
    await fetch(API, {
      method: 'POST',
      body: JSON.stringify({ action: 'delete', id })
    });
    showToast('ลบเรียบร้อย');
  } catch(e) { loadData(); }
}

// ── RENDER ──
function getFiltered() {
  const from = document.getElementById('fFrom').value;
  const to   = document.getElementById('fTo').value;
  const type = document.getElementById('fType').value;
  const search = document.getElementById('fSearch').value.trim().toLowerCase();
  return entries.filter(e => {
    if (from && e.date < from) return false;
    if (to   && e.date > to)   return false;
    if (type && e.type !== type) return false;
    if (search && !(e.desc.toLowerCase().includes(search) || e.remark.toLowerCase().includes(search))) return false;
    return true;
  }).sort((a,b) => a.date.localeCompare(b.date));
}

function fmt(n) { return n === 0 ? '' : n.toLocaleString('th-TH'); }
function fmtDate(s) {
  if (!s) return '';
  const d = new Date(s);
  return `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
}

function render() {
  const list = getFiltered();
  document.getElementById('filterInfo').textContent =
    list.length < entries.length ? `แสดง ${list.length} จาก ${entries.length} รายการ` : `${entries.length} รายการ`;

  let tP = 0, tI = 0, tE = 0;
  const rows = list.map(e => {
    let pv = '', iv = '', ev = '';
    if (e.type === 'principal') {
      pv = `<span class="${e.amount < 0 ? 'amt-neg' : 'amt-p'}">${e.amount < 0 ? '('+fmt(-e.amount)+')' : fmt(e.amount)}</span>`;
      tP += e.amount;
      if (e.interest) { iv = `<span class="amt-i">${fmt(e.interest)}</span>`; tI += e.interest; }
    } else if (e.type === 'interest') {
      iv = `<span class="amt-i">${fmt(e.amount)}</span>`; tI += e.amount;
    } else {
      ev = `<span class="amt-e">${fmt(e.amount)}</span>`; tE += e.amount;
    }
    const bl = e.type==='principal'?'bp':e.type==='interest'?'bi':'be';
    const tn = e.type==='principal'?'เงินต้น':e.type==='interest'?'ดอกเบี้ย':'เบิกใช้';
    return `<tr>
      <td>${fmtDate(e.date)}</td>
      <td title="${e.desc}">${e.desc}</td>
      <td><span class="badge ${bl}">${tn}</span></td>
      <td class="r">${pv}</td>
      <td class="r">${iv}</td>
      <td class="r">${ev}</td>
      <td class="remark" title="${e.remark}">${e.remark}</td>
      <td><button class="btn-del" onclick="deleteEntry('${e.id}')" title="ลบ">✕</button></td>
    </tr>`;
  }).join('');

  document.getElementById('tbody').innerHTML = rows || '<tr class="loading-row"><td colspan="8" style="color:var(--hint)">ไม่พบรายการ</td></tr>';
  document.getElementById('tfoot').innerHTML = `<tr>
    <td colspan="3" style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px">รวม</td>
    <td class="r"><span class="${tP>=0?'amt-p':'amt-neg'}">${tP<0?'('+fmt(-tP)+')':fmt(tP)}</span></td>
    <td class="r"><span class="amt-i">${fmt(tI)}</span></td>
    <td class="r"><span class="amt-e">${fmt(tE)}</span></td>
    <td colspan="2"></td>
  </tr>`;

  const net = tI - tE;
  document.getElementById('sP').textContent   = tP.toLocaleString('th-TH');
  document.getElementById('sI').textContent   = tI.toLocaleString('th-TH');
  document.getElementById('sE').textContent   = tE.toLocaleString('th-TH');
  const sNet = document.getElementById('sNet');
  sNet.textContent = (net >= 0 ? '+' : '') + net.toLocaleString('th-TH');
  sNet.className = 'val val-net ' + (net >= 0 ? 'net-pos' : 'net-neg');
}

function clearFilter() {
  ['fFrom','fTo','fSearch'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fType').value = '';
  render();
}

function exportExcel() {
  const list = getFiltered();
  const rows = [['วันที่','รายละเอียด','ประเภท','เงินต้น','ดอกเบี้ย','เบิกใช้','หมายเหตุ']];
  let tP=0, tI=0, tE=0;
  list.forEach(e => {
    let p='', i='', ex='';
    if (e.type==='principal') { p=e.amount; tP+=e.amount; if(e.interest){i=e.interest;tI+=e.interest;} }
    else if (e.type==='interest') { i=e.amount; tI+=e.amount; }
    else { ex=e.amount; tE+=e.amount; }
    rows.push([fmtDate(e.date), e.desc, e.type==='principal'?'เงินต้น':e.type==='interest'?'ดอกเบี้ย':'เบิกใช้', p||'', i||'', ex||'', e.remark]);
  });
  rows.push(['','','รวม', tP, tI, tE, '']);
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:12},{wch:36},{wch:10},{wch:12},{wch:12},{wch:12},{wch:28}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, 'รายการ', ws);
  XLSX.writeFile(wb, 'รายรับรายจ่าย.xlsx');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
